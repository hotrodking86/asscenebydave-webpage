<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>As Scene by Dave</title>

<style>

body{

    margin:0;

    font-family:Arial, Helvetica, sans-serif;

    background:#f7f7f7;

    color:#333;

}

.container{

    max-width:800px;

    margin:0 auto;

    padding:40px 20px;

    text-align:center;

}

.logo{

    max-width:350px;

    width:100%;

    height:auto;

    margin-bottom:20px;

}

h1{

    margin-bottom:10px;

    color:#b08b46;

}

.tagline{

    font-size:1.1rem;

    margin-bottom:35px;

    line-height:1.6;

}

.links{

    display:flex;

    flex-direction:column;

    gap:15px;

}

.btn{

    display:block;

    padding:15px;

    text-decoration:none;

    font-weight:bold;

    border-radius:10px;

    background:#b08b46;

    color:white;

    transition:.2s;

}

.btn:hover{

    opacity:.9;

    transform:translateY(-2px);

}

.footer{

    margin-top:40px;

    font-size:.9rem;

    color:#666;

}

</style>

</head>

<body>

<div class="container">

    <img src="logo.jpg" alt="As Scene by Dave" class="logo">

    <h1>Welcome to As Scene by Dave</h1>

    <p class="tagline">

        Exploring Hollywood history, true crime locations, celebrity graves,

        filming locations, and the stories behind them.

    </p>

    <div class="links">

        <a class="btn" href="https://youtube.com/@asscenebydave?si=95MI_r_JNEmphG2i" target="_blank">

            YouTube Channel

        </a>

        <a class="btn" href="https://www.instagram.com/asscenebydave?igsh=NTc4MTIwNjQ2YQ%3D%3D&utm_source=qr" target="_blank">

            Instagram

        </a>

        <a class="btn" href="https://www.facebook.com/asscenebydave?mibextid=wwXIfr" target="_blank">

            Facebook

        </a>

        <a class="btn" href="https://www.tiktok.com/t/ZP8svpsRt/" target="_blank">

            TikTok

        </a>

        <a class="btn" href="https://buymeacoffee.com/asscenebydave" target="_blank">

            Buy Me a Coffee ☕

        </a>

    </div>

    <div class="footer">

        © 2026 As Scene by Dave

    </div>

</div>
