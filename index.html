<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>As Scene by Dave</title>
  <meta name="description" content="As Scene by Dave explores Hollywood history, true crime locations, celebrity graves, filming locations, and the stories behind them." />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, #f5f1e8 45%, #ece7dd 100%);
      color: #2d2a26;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: 100%;
      max-width: 720px;
      text-align: center;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(176,139,70,.25);
      border-radius: 26px;
      padding: 34px 22px 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,.09);
    }
    .logo {
      width: min(380px, 88%);
      height: auto;
      margin: 0 auto 18px;
      display: block;
    }
    h1 {
      margin: 8px 0 12px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: #a87f3f;
      line-height: 1.05;
    }
    p {
      margin: 0 auto 26px;
      max-width: 560px;
      font-size: 1.08rem;
      line-height: 1.6;
    }
    .links {
      display: grid;
      gap: 13px;
      margin: 0 auto;
      max-width: 440px;
    }
    a.button {
      display: block;
      padding: 15px 18px;
      border-radius: 999px;
      background: #a87f3f;
      color: white;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: .2px;
      transition: transform .15s ease, opacity .15s ease;
    }
    a.button:hover,
    a.button:focus {
      transform: translateY(-2px);
      opacity: .92;
    }
    footer {
      margin-top: 28px;
      color: #766f66;
      font-size: .92rem;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo.jpg" alt="As Scene by Dave logo" />

    <h1>Welcome to As Scene by Dave</h1>

    <p>
      Exploring Hollywood history, true crime locations, celebrity graves,
      filming locations, and the stories behind them.
    </p>

    <section class="links" aria-label="Social links">
      <a class="button" href="https://youtube.com/@asscenebydave?si=95MI_r_JNEmphG2i" target="_blank" rel="noopener noreferrer">YouTube Channel</a>
      <a class="button" href="https://www.instagram.com/asscenebydave?igsh=NTc4MTIwNjQ2YQ%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a class="button" href="https://www.facebook.com/asscenebydave?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a>
      <a class="button" href="https://www.tiktok.com/t/ZP8svpsRt/" target="_blank" rel="noopener noreferrer">TikTok</a>
      <a class="button" href="https://buymeacoffee.com/asscenebydave" target="_blank" rel="noopener noreferrer">Buy Me a Coffee ☕</a>
    </section>

    <footer>© 2026 As Scene by Dave</footer>
  </main>
</body>
</html>
